apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webapp-ingress

spec:
  ingressClassName: nginx

  rules:
  - host: app.192.168.56.11.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: webapp-service
            port:
              number: 3000
